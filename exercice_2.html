<!DOCTYPE html>
<html>
<head>
<title>Calculatrice Simple</title>
</head>

<body>

<input type="text" id="n1"><br><br>
<input type="text" id="n2"><br><br>

<button onclick="add()">+</button>
<button onclick="sub()">-</button>
<button onclick="mul()">*</button>
<button onclick="div()">/</button>

<br><br>

<input type="text" id="res">

<script>

function add(){
    var a = Number(document.getElementById("n1").value);
    var b = Number(document.getElementById("n2").value);
    document.getElementById("res").value = a + b;
}

function sub(){
    var a = Number(document.getElementById("n1").value);
    var b = Number(document.getElementById("n2").value);
    document.getElementById("res").value = a - b;
}

function mul(){
    var a = Number(document.getElementById("n1").value);
    var b = Number(document.getElementById("n2").value);
    document.getElementById("res").value = a * b;
}

function div(){
    var a = Number(document.getElementById("n1").value);
    var b = Number(document.getElementById("n2").value);
    document.getElementById("res").value = a / b;
}

</script>

</body>
</html>
